<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Operação</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f8f9fa; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        .valor { font-size: 32px; font-weight: bold; color: #2c3e50; margin: 20px 0; }
        button { background: #007bff; color: white; border: none; padding: 15px 25px; border-radius: 6px; cursor: pointer; font-size: 16px; width: 100%; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .status { margin-top: 20px; font-size: 12px; color: #7f8c8d; }
    </style>
</head>
<body>

<div class="card">
    <h3>Verificação de Documento</h3>
    <p>Confirme se o valor abaixo está correto:</p>
    <div class="valor" id="valorDocumento">R$ 9.432,00</div>
    <button onclick="proximaTarefa()">Processar e Carregar Próximo</button>
    <div class="status">Sistema Online - Aguardando validação</div>
</div>

<script>
    function proximaTarefa() {
        // Gera um valor aleatório para a pessoa interagir
        const novoValor = (Math.random() * 10000).toFixed(2);
        document.getElementById('valorDocumento').innerText = "R$ " + novoValor.replace('.', ',');
    }
</script>

</body>
</html>
